{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header">
                <h3>User Login</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email"
                               class="form-control"
                               name="email"
                               required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password"
                               class="form-control"
                               name="password"
                               required>
                    </div>
                    <button class="btn btn-primary w-100">
                        Login
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
