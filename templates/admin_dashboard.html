{% extends 'base.html' %} {% block content %}

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold">
        <i class="bi bi-speedometer2"></i>
        Admin Dashboard
      </h2>

      <p class="text-muted">Manage Railway Management System</p>
    </div>

    <div>
      <a href="/admin/add_train" class="btn btn-success">
        <i class="bi bi-plus-circle"></i>
        Add Train
      </a>

      <a href="/logout" class="btn btn-danger">
        <i class="bi bi-box-arrow-right"></i>
        Logout
      </a>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="bi bi-people-fill display-4 text-primary"></i>

        <h5 class="mt-3">Total Users</h5>

        <h2 class="fw-bold">{{ total_users }}</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="bi bi-train-front-fill display-4 text-success"></i>

        <h5 class="mt-3">Total Trains</h5>

        <h2 class="fw-bold">{{ total_trains }}</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card dashboard-card text-center p-4">
        <i class="bi bi-ticket-perforated-fill display-4 text-warning"></i>

        <h5 class="mt-3">Total Bookings</h5>

        <h2 class="fw-bold">{{ total_bookings }}</h2>
      </div>
    </div>
  </div>

  <div class="card mt-5 shadow">
    <div class="card-header bg-dark text-white">
      <h4 class="mb-0">
        <i class="bi bi-lightning-fill"></i>

        Quick Actions
      </h4>
    </div>

    <div class="card-body">
      <div class="row g-4">
        <div class="col-md-4">
          <a href="/admin/add_train" class="btn btn-success w-100 p-3">
            <i class="bi bi-plus-circle-fill"></i>

            Add Train
          </a>
        </div>

        <div class="col-md-4">
          <a href="/admin/trains" class="btn btn-primary w-100 p-3">
            <i class="bi bi-train-front-fill"></i>

            Manage Trains
          </a>
        </div>

        <div class="col-md-4">
          <a href="/" class="btn btn-secondary w-100 p-3">
            <i class="bi bi-house-fill"></i>

            User Portal
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
