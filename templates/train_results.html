<!DOCTYPE html>
<html>
    <head>
        <title>Available Trains</title>
    </head>
    <body>
        <table border=1>
            <tr>
                <th>ID</th>
                <th>Train Name</th>
                <th>Source</th>
                <th>Destination</th>
                <th>Departure</th>
                <th>Arrival</th>
            </tr>
            {% for train in trains%}
            <tr>
                <td>{{train.train_id}}</td>
                <td>{{train.train_name}}</td>
                <td>{{train.source}}</td>
                <td>{{train.destination}}</td>
                <td>{{train.departure_time}}</td>
                <td>{{train.arrival_time}}</td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <a href="/search">Search Again</a>
    </body>
</html>
