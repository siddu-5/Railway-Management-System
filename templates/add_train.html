<!DOCTYPE html>
<html>
    <head>
        <title>Add Trains</title>
    </head>
    <body>
        <h2>Add Trains</h2>
        <form method="POST">
            <label>Train Name:</label>
            <input type="text" name="train_name" placeholder="Train Name" required><br>
            <label>Source:</label>
            <input type="text" name="source" placeholder="Source" required><br>
            <label>Destination:</label>
            <input type="text" name="destination" placeholder="Destination" required><br>
            <label>Departure Time:</label>
            <input type="text" name="departure_time" placeholder="Departure Time" required><br>
            <label>Arrival Time:</label>
            <input type="text" name="arrival_time" placeholder="Arrival Time" required><br>
            <label>Total Seats:</label>
            <input type="number" name="total_seats" placeholder="Total Seats" required><br>
            <button type="submit">Add Train</button>
        </form>
    </body>
</html>
